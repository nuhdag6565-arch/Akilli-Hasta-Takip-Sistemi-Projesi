<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="İnme Risk Tahmin Sistemi - Doktor Girişi ve Yönetim Paneli. Yapay zeka destekli inme riski değerlendirmesi.">
    <title>🧠 İnme Risk Sistemi — Doktor Paneli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- ════════════════════════════════════════════ -->
    <!-- EKRAN 1 — GİRİŞ                            -->
    <!-- ════════════════════════════════════════════ -->
    <div class="screen active" id="screenLogin">
        <div class="card card-login">
            <div class="card-glow"></div>
            <div class="card-header">
                <div class="logo-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
                        <path d="M24 10C18 10 14 15 14 20C14 26 18 28 20 32C21 34 22 38 24 38C26 38 27 34 28 32C30 28 34 26 34 20C34 15 30 10 24 10Z" fill="url(#logoGrad)" opacity="0.9"/>
                        <path d="M20 22C20 22 22 26 24 26C26 26 28 22 28 22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="20" cy="19" r="1.5" fill="white"/>
                        <circle cx="28" cy="19" r="1.5" fill="white"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#a855f7"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">İnme Risk Sistemi</h1>
                <p class="app-subtitle">Doktor Girişi</p>
            </div>

            <form id="loginForm" class="card-body" autocomplete="off">
                <div class="input-group">
                    <label for="loginTC">TC Kimlik Numarası</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🪪</span>
                        <input type="text" id="loginTC" maxlength="11" pattern="\d{11}" placeholder="11 haneli TC numaranız" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Şifre</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="Şifrenizi girin" required>
                        <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Şifreyi göster/gizle">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="btnLogin">
                    <span class="btn-icon">🔐</span>
                    <span>Giriş Yap</span>
                    <div class="btn-loader" style="display:none;"></div>
                </button>

                <div class="divider">
                    <span>veya</span>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn btn-outline" id="btnGoRegister">
                        <span class="btn-icon">📋</span>
                        <span>Kayıt Ol</span>
                    </button>
                    <button type="button" class="btn btn-ghost" id="btnGoForgot">
                        <span class="btn-icon">🔓</span>
                        <span>Şifremi Unuttum</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- EKRAN 2 — KAYIT OL                         -->
    <!-- ════════════════════════════════════════════ -->
    <div class="screen" id="screenRegister">
        <div class="card card-register">
            <div class="card-glow"></div>
            <div class="card-header">
                <div class="logo-icon small">
                    <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="url(#logoGrad2)" stroke-width="2.5" fill="none"/>
                        <path d="M24 10C18 10 14 15 14 20C14 26 18 28 20 32C21 34 22 38 24 38C26 38 27 34 28 32C30 28 34 26 34 20C34 15 30 10 24 10Z" fill="url(#logoGrad2)" opacity="0.9"/>
                        <defs>
                            <linearGradient id="logoGrad2" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#a855f7"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">Hesap Oluştur</h1>
                <p class="app-subtitle">Sisteme ilk kez mi katılıyorsunuz?</p>
            </div>

            <form id="registerForm" class="card-body" autocomplete="off">
                <div class="input-row">
                    <div class="input-group">
                        <label for="regTC">TC Kimlik No</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🪪</span>
                            <input type="text" id="regTC" maxlength="11" pattern="\d{11}" placeholder="TC No" required>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="regName">Ad</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="regName" placeholder="Adınız" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="regSurname">Soyad</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="regSurname" placeholder="Soyadınız" required>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="regSpecialty">Uzmanlık Alanı</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🩺</span>
                        <select id="regSpecialty" required>
                            <option value="" disabled selected>Uzmanlık seçin</option>
                            <option value="Nöroloji">Nöroloji</option>
                            <option value="Kardiyoloji">Kardiyoloji</option>
                            <option value="Dahiliye">Dahiliye</option>
                            <option value="Acil Tıp">Acil Tıp</option>
                            <option value="Fizik Tedavi">Fizik Tedavi ve Rehabilitasyon</option>
                            <option value="Nöroşirürji">Nöroşirürji</option>
                            <option value="Radyoloji">Radyoloji</option>
                            <option value="Aile Hekimliği">Aile Hekimliği</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="regPassword">Şifre</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="regPassword" placeholder="Min 6 karakter" minlength="6" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="regPasswordConfirm">Şifre Tekrar</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="regPasswordConfirm" placeholder="Tekrar girin" minlength="6" required>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="regSecurityQ">Güvenlik Sorusu</label>
                    <div class="input-wrapper">
                        <span class="input-icon">❓</span>
                        <select id="regSecurityQ" required>
                            <option value="" disabled selected>Bir soru seçin</option>
                            <option value="anne">Annenizin kızlık soyadı nedir?</option>
                            <option value="okul">İlkokul adınız nedir?</option>
                            <option value="sehir">Doğduğunuz şehir neresidir?</option>
                            <option value="hayvan">İlk evcil hayvanınızın adı nedir?</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="regSecurityA">Güvenlik Sorusu Cevabı</label>
                    <div class="input-wrapper">
                        <span class="input-icon">💬</span>
                        <input type="text" id="regSecurityA" placeholder="Cevabınız" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-full" id="btnRegister">
                    <span class="btn-icon">✅</span>
                    <span>Hesap Oluştur</span>
                </button>

                <button type="button" class="btn btn-link" id="btnBackToLogin1">
                    <span>← Giriş Ekranına Dön</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- EKRAN 3 — ŞİFREMİ UNUTTUM                  -->
    <!-- ════════════════════════════════════════════ -->
    <div class="screen" id="screenForgot">
        <div class="card card-forgot">
            <div class="card-glow"></div>
            <div class="card-header">
                <div class="logo-icon small">
                    <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="url(#logoGrad3)" stroke-width="2.5" fill="none"/>
                        <path d="M24 10C18 10 14 15 14 20C14 26 18 28 20 32C21 34 22 38 24 38C26 38 27 34 28 32C30 28 34 26 34 20C34 15 30 10 24 10Z" fill="url(#logoGrad3)" opacity="0.9"/>
                        <defs>
                            <linearGradient id="logoGrad3" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#a855f7"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">Şifre Sıfırlama</h1>
                <p class="app-subtitle">Hesabınızı kurtarın</p>
            </div>

            <!-- Adım 1: TC Gir -->
            <div class="card-body" id="forgotStep1">
                <div class="step-indicator">
                    <div class="step active">1</div>
                    <div class="step-line"></div>
                    <div class="step">2</div>
                </div>

                <div class="input-group">
                    <label for="forgotTC">TC Kimlik Numaranız</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🪪</span>
                        <input type="text" id="forgotTC" maxlength="11" pattern="\d{11}" placeholder="Kayıtlı TC numaranız" required>
                    </div>
                </div>

                <button type="button" class="btn btn-primary btn-full" id="btnForgotStep1">
                    <span class="btn-icon">🔍</span>
                    <span>Devam Et</span>
                </button>

                <button type="button" class="btn btn-link" id="btnBackToLogin2">
                    <span>← Giriş Ekranına Dön</span>
                </button>
            </div>

            <!-- Adım 2: Güvenlik Sorusu + Yeni Şifre -->
            <div class="card-body hidden" id="forgotStep2">
                <div class="step-indicator">
                    <div class="step completed">✓</div>
                    <div class="step-line active"></div>
                    <div class="step active">2</div>
                </div>

                <div class="security-question-box" id="securityQuestionDisplay">
                    <!-- Güvenlik sorusu burada gösterilecek -->
                </div>

                <div class="input-group">
                    <label for="forgotSecurityA">Cevabınız</label>
                    <div class="input-wrapper">
                        <span class="input-icon">💬</span>
                        <input type="text" id="forgotSecurityA" placeholder="Güvenlik sorusu cevabı" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="forgotNewPass">Yeni Şifre</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="forgotNewPass" placeholder="Yeni şifre" minlength="6" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="forgotNewPassConfirm">Şifre Tekrar</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="forgotNewPassConfirm" placeholder="Tekrar girin" minlength="6" required>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn btn-warning btn-full" id="btnResetPassword">
                    <span class="btn-icon">🔄</span>
                    <span>Şifremi Sıfırla</span>
                </button>

                <button type="button" class="btn btn-link" id="btnBackToStep1">
                    <span>← Önceki Adım</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!-- EKRAN 4 — PROFİL                           -->
    <!-- ════════════════════════════════════════════ -->
    <div class="screen" id="screenProfile">
        <div class="card card-profile">
            <div class="card-glow"></div>
            
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <span>👨‍⚕️</span>
                </div>
                <h1 class="profile-name" id="profileName">Dr. —</h1>
                <div class="profile-badge">
                    <span class="badge-icon">🩺</span>
                    <span id="profileSpecialtyBadge">—</span>
                </div>
            </div>

            <!-- Profile Info Cards -->
            <div class="profile-info-grid">
                <div class="info-card">
                    <span class="info-label">Doktor ID</span>
                    <span class="info-value" id="profileDoctorId">—</span>
                </div>
                <div class="info-card">
                    <span class="info-label">TC No</span>
                    <span class="info-value" id="profileTC">—</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Uzmanlık</span>
                    <span class="info-value" id="profileSpecialty">—</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Kayıt Tarihi</span>
                    <span class="info-value" id="profileRegDate">—</span>
                </div>
                <div class="info-card span-2">
                    <span class="info-label">Son Giriş</span>
                    <span class="info-value" id="profileLastLogin">—</span>
                </div>
            </div>

            <!-- Change Password Section (Collapsible) -->
            <div class="collapsible-section">
                <button type="button" class="collapsible-toggle" id="btnToggleChangePass">
                    <span>🔑 Şifre Değiştir</span>
                    <span class="chevron">▼</span>
                </button>
                <div class="collapsible-content hidden" id="changePassSection">
                    <div class="input-group">
                        <label for="currentPass">Mevcut Şifre</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="currentPass" placeholder="Mevcut şifreniz">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="newPass">Yeni Şifre</label>
                            <div class="input-wrapper">
                                <span class="input-icon">🔒</span>
                                <input type="password" id="newPass" placeholder="Yeni şifre" minlength="6">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="newPassConfirm">Tekrar</label>
                            <div class="input-wrapper">
                                <span class="input-icon">🔒</span>
                                <input type="password" id="newPassConfirm" placeholder="Tekrar girin" minlength="6">
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary btn-full btn-sm" id="btnChangePass">
                        <span>Şifreyi Güncelle</span>
                    </button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="profile-actions">
                <button type="button" class="btn btn-success btn-large" id="btnGoPatient">
                    <span class="btn-icon">🏥</span>
                    <span>Hasta Modülüne Geç</span>
                </button>
                <button type="button" class="btn btn-danger" id="btnLogout">
                    <span class="btn-icon">🚪</span>
                    <span>Çıkış</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
